<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Employee Management System</h2>
    <input id="name" placeholder="Employee Name">
    <input id="id" placeholder="Employee ID">
    <input id="salary" placeholder="Salary">
    <input id="dept" placeholder="Department">
    <button onclick="addEmployee()">Add Employee</button>
    <hr>
    <button onclick="displayEmployees()">Display All</button>
    <button onclick="filterSalary()">Salary > ₹50,000</button>
    <button onclick="totalSalary()">Total Salary</button>
    <button onclick="averageSalary()">Average Salary</button>
    <button onclick="countDepartment()">Count by Dept</button>

    <div id="output"></div>
</div>

<script src="script.js"></script>

</body>
</html>
